name: Wheel building

on:
  # Enable again in
  # https://github.com/spacetelescope/acstools/pull/241
  # when we can split the publish part away from pull_request
  #pull_request:
  #  # We also want this workflow triggered if the 'Build wheels'
  #  # label is added or present when PR is updated
  #  types:
  #    - synchronize
  #    - labeled
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# NOTE: Cannot use OpenAstronomy workflow due to
#       https://github.com/OpenAstronomy/github-actions-workflows/issues/168
jobs:
  build_and_publish:
    # This job builds the wheels and publishes them to PyPI for all
    # tags. For PRs with the "Build wheels" label, wheels are built,
    # but are not uploaded to PyPI.

    permissions:
      contents: none

    runs-on: ubuntu-latest
    if: (github.repository == 'spacetelescope/acstools' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'Build wheels')))

    # This is for publish step only.
    environment:
      name: release
      url: https://pypi.org/p/acstools
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.11'

    - name: Install python-build and twine
      run: python -m pip install build "twine>=3.3"

    - name: Build package
      run: python -m build --sdist --wheel .

    - name: List result
      run: ls -lh dist

    - name: Check dist
      run: python -m twine check --strict dist/*

    - name: Publish distribution 📦 to PyPI
      if: (startsWith(github.ref, 'refs/tags/') && github.event_name == 'push')
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
